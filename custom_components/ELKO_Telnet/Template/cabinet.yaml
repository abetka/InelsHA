# Cabinet — modern template entities (replaces legacy `- platform: template` blocks).
# Migrated for HA 2026.6, which removes the legacy template switch/cover platforms.
- switch:
    - name: cabinet_light_table_tmp
      unique_id: elko_template_cabinet_light_table_tmp
      default_entity_id: switch.cabinet_light_table_tmp
      state: "{{ is_state('switch.cabinet_light_table', 'on') }}"
      icon: >-
        {% if is_state('switch.cabinet_light_table', 'on') %}
          mdi:desk-lamp-on
        {% else %}
          mdi:desk-lamp-off
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.cabinet_light_table
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.cabinet_light_table

    - name: cabinet_light_wall_tmp
      unique_id: elko_template_cabinet_light_wall_tmp
      default_entity_id: switch.cabinet_light_wall_tmp
      state: "{{ is_state('switch.cabinet_light_wall', 'on') }}"
      icon: >-
        {% if is_state('switch.cabinet_light_wall', 'on') %}
          mdi:wall-sconce-flat
        {% else %}
          mdi:wall-sconce-flat-outline
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.cabinet_light_wall
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.cabinet_light_wall

    - name: cabinet_chandelier_tmp
      unique_id: elko_template_cabinet_chandelier_tmp
      default_entity_id: switch.cabinet_chandelier_tmp
      state: "{{ is_state('switch.cabinet_chandelier', 'on') }}"
      icon: >-
        {% if is_state('switch.cabinet_chandelier', 'on') %}
          mdi:ceiling-light
        {% else %}
          mdi:ceiling-light-outline
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.cabinet_chandelier
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.cabinet_chandelier

- cover:
    - name: cabinet_curtain
      unique_id: elko_template_cabinet_curtain
      default_entity_id: cover.cabinet_curtain
      device_class: curtain
      position: >-
        {% if is_state('switch.cabinet_curtains_open', 'on') %}
          99
        {% else %}
          0
        {% endif %}
      icon: >-
        {% if is_state('switch.cabinet_curtains_open', 'on') %}
          mdi:curtains
        {% else %}
          mdi:curtains-closed
        {% endif %}
      open_cover:
        - if:
            - alias: "If curtain in close state"
              condition: state
              entity_id: switch.cabinet_curtains_close
              state: 'on'
          then:
            - alias: "Turn Off close state"
              action: switch.turn_off
              target:
                entity_id: switch.cabinet_curtains_close
        - action: switch.turn_on
          target:
            entity_id: switch.cabinet_curtains_open
      close_cover:
        - if:
            - alias: "If curtain in open state"
              condition: state
              entity_id: switch.cabinet_curtains_open
              state: 'on'
          then:
            - alias: "Turn Off open state"
              action: switch.turn_off
              target:
                entity_id: switch.cabinet_curtains_open
        - action: switch.turn_on
          target:
            entity_id: switch.cabinet_curtains_close
