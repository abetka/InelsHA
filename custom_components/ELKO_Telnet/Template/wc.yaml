# WC — modern template entities (replaces legacy `- platform: template` blocks).
# Migrated for HA 2026.6, which removes the legacy template switch/cover platforms.
- switch:
    - name: wc_floor_heater_tmp
      unique_id: elko_template_wc_floor_heater_tmp
      default_entity_id: switch.wc_floor_heater_tmp
      state: "{{ is_state('switch.wc_floor_heater', 'on') }}"
      icon: >-
        {% if is_state('switch.wc_floor_heater', 'on') %}
          mdi:radiator
        {% else %}
          mdi:radiator-disabled
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.wc_floor_heater
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.wc_floor_heater

    - name: wc_mirror_tmp
