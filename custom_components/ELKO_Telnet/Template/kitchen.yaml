- cover:
    - name: kitchen_curtain
      unique_id: elko_template_kitchen_curtain
      default_entity_id: cover.kitchen_curtain
      device_class: curtain
      position: >-
        {% if is_state('switch.kitchen_curtains_open', 'on') %}
          99
        {% else %}
          0
        {% endif %}
      icon: >-
        {% if is_state('switch.kitchen_curtains_open', 'on') %}
          mdi:curtains
        {% else %}
          mdi:curtains-closed
        {% endif %}
      open_cover:
        - if:
            - alias: "If curtain in close state"
              condition: state
              entity_id: switch.kitchen_curtains_close
              state: 'on'
          then:
            - alias: "Turn Off close state"
              action: switch.turn_off
              target:
                entity_id: switch.kitchen_curtains_close
        - action: switch.turn_on
          target:
            entity_id: switch.kitchen_curtains_open
      close_cover:
        - if:
            - alias: "If curtain in open state"
              condition: state
              entity_id: switch.kitchen_curtains_open
              state: 'on'
          then:
            - alias: "Turn Off open state"
              action: switch.turn_off
              target:
                entity_id: switch.kitchen_curtains_open
        - action: switch.turn_on
          target:
            entity_id: switch.kitchen_curtains_close

    - name: kitchen_tule
      unique_id: elko_template_kitchen_tule
      default_entity_id: cover.kitchen_tule
      device_class: curtain
      position: >-
        {% if is_state('switch.kitchen_tule_open', 'on') %}
          99
        {% else %}
          0
        {% endif %}
      icon: >-
        {% if is_state('switch.kitchen_tule_open', 'on') %}
          mdi:curtains
        {% else %}
          mdi:curtains-closed
        {% endif %}
      open_cover:
        - if:
            - alias: "If tule in close state"
              condition: state
              entity_id: switch.kitchen_tule_close
              state: 'on'
          then:
            - alias: "Turn Off close state"
              action: switch.turn_off
              target:
                entity_id: switch.kitchen_tule_close
        - action: switch.turn_on
          target:
            entity_id: switch.kitchen_tule_open
      close_cover:
        - if:
            - alias: "If tule in open state"
              condition: state
              entity_id: switch.kitchen_tule_open
              state: 'on'
          then:
            - alias: "Turn Off open state"
              action: switch.turn_off
              target:
                entity_id: switch.kitchen_tule_open
        - action: switch.turn_on
          target:
            entity_id: switch.kitchen_tule_close
