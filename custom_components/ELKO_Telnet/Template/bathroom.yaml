# Bathroom — modern template entities (replaces legacy `- platform: template` blocks).
# Migrated for HA 2026.6, which removes the legacy template switch/cover platforms.
- switch:
    - name: bathroom_floor_heater_tmp
      unique_id: elko_template_bathroom_floor_heater_tmp
      default_entity_id: switch.bathroom_floor_heater_tmp
      state: "{{ is_state('switch.bathroom_floor_heater', 'on') }}"
      icon: >-
        {% if is_state('switch.bathroom_floor_heater', 'on') %}
          mdi:radiator
        {% else %}
          mdi:radiator-disabled
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.bathroom_floor_heater
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.bathroom_floor_heater

    - name: bathroom_mirror_tmp
      unique_id: elko_template_bathroom_mirror_tmp
      default_entity_id: switch.bathroom_mirror_tmp
      state: "{{ is_state('switch.bathroom_mirror', 'on') }}"
      icon: >-
        {% if is_state('switch.bathroom_mirror', 'on') %}
          mdi:globe-light
        {% else %}
          mdi:globe-light-outline
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.bathroom_mirror
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.bathroom_mirror

    - name: bathroom_backlight_tmp
      unique_id: elko_template_bathroom_backlight_tmp
      default_entity_id: switch.bathroom_backlight_tmp
      state: "{{ is_state('switch.bathroom_backlight', 'on') }}"
      icon: >-
        {% if is_state('switch.bathroom_backlight', 'on') %}
          mdi:wall-sconce-flat
        {% else %}
          mdi:wall-sconce-flat-outline
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.bathroom_backlight
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.bathroom_backlight

    - name: bathroom_fan_tmp
      unique_id: elko_template_bathroom_fan_tmp
      default_entity_id: switch.bathroom_fan_tmp
      state: "{{ is_state('switch.bathroom_fan', 'on') }}"
      icon: >-
        {% if is_state('switch.bathroom_fan', 'on') %}
          mdi:fan
        {% else %}
          mdi:fan-off
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.bathroom_fan
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.bathroom_fan

    - name: bathroom_pointslights_tmp
      unique_id: elko_template_bathroom_pointslights_tmp
      default_entity_id: switch.bathroom_pointslights_tmp
      state: "{{ is_state('switch.bathroom_pointslights', 'on') }}"
      icon: >-
        {% if is_state('switch.bathroom_pointslights', 'on') %}
          mdi:ceiling-light
        {% else %}
          mdi:ceiling-light-outline
        {% endif %}
      turn_on:
        - action: switch.turn_on
          target:
            entity_id: switch.bathroom_pointslights
      turn_off:
        - action: switch.turn_off
          target:
            entity_id: switch.bathroom_pointslights
