- platform: ELKO_telnet
  switches:
    bathroom_floor_heater:
      resource: "192.168.88.246"
      port: 1111
      command_on: "1"
      command_off: "0"
      value_template: >-
        {% if value == '1' %}
          True
        {% else %}
          False
        {% endif %}
      timeout: 0.1
      name: "Bathroom Floor Heater"
      device_id: "0x01020043"
