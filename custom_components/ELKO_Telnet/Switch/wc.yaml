# WC Floor Heater
- platform: ELKO_telnet
  switches:
    wc_floor_heater: &settings
      resource: "192.168.88.246"
      port: 1111
      command_on: "1"
      command_off: "0"
      value_template: >-
        {% if value == '1' %}
          True
        {% else %}
          False
        {% endif %}
      timeout: 0.1
      name: WC Floor Heater
      device_id: "0x01020023"
- platform: ELKO_telnet
  switches:
    wc_mirror:
      <<: *settings
      name: WC Mirror Backlight
      device_id: "0x01020003"
- platform: ELKO_telnet
  switches:
    wc_backlight:
      <<: *settings
      name: WC Wall Backlight
      device_id: "0x01020014"
- platform: ELKO_telnet
  switches:
    wc_fan:
      <<: *settings
      name: WC Fan
      device_id: "0x01020025"
- platform: ELKO_telnet
  switches:
    wc_pointslights:
      <<: *settings
      name: WC Points Light
      device_id: "0x0102002e"
- platform: ELKO_telnet
  switches:
    wc_switch_1_green_1:
      <<: *settings
      name: WC Switch 1 Green 1
      device_id: "0x01020053"
- platform: ELKO_telnet
  switches:
    wc_switch_1_green_2:
      <<: *settings
      name: WC Switch 1 Green 2
      device_id: "0x01020055"
- platform: ELKO_telnet
  switches:
    wc_switch_1_green_3:
      <<: *settings
      name: WC Switch 1 Green 3
      device_id: "0x0102001d"
- platform: ELKO_telnet
  switches:
    wc_switch_1_red_1:
      <<: *settings
      name: WC Switch 1 Red 1
      device_id: "0x01020054"
- platform: ELKO_telnet
  switches:
    wc_switch_1_red_2:
      <<: *settings
      name: WC Switch 1 Red 2
      device_id: "0x01020056"
- platform: ELKO_telnet
  switches:
    wc_switch_1_red_3:
      <<: *settings
      name: WC Switch 1 Red 3
      device_id: "0x0102001e"
- platform: ELKO_telnet
  switches:
    wc_waterleak:
      <<: *settings
      command_on: "0"
      command_off: "1"
      name: WC Waterleak
      device_id: "0x01020027"

# NOTE: legacy `- platform: template` switch blocks for this room have been
# migrated to the modern top-level `template:` integration. See
# ../Template/wc.yaml. Required for HA 2026.6.