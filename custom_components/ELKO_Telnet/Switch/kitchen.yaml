# Kitchen Floor Heater
- platform: ELKO_telnet
  switches:
    kitchen_floor_heater: &settings
      resource: "192.168.88.246"
      port: 1111
      command_on: "1"
      command_off: "0"
      value_template: >-
        {% if value == '1' %}
          True
        {% else %}
          False
        {% endif %}
      timeout: 0.1
      name: Kitchen Floor Heater
      device_id: "0x0102001a"
- platform: ELKO_telnet
  switches:
    kitchen_heater:
      <<: *settings
      name: Kitchen Heater
      device_id: "0x01020013"
