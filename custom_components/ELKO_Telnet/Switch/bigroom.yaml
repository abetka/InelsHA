# BigRoom Heater
- platform: ELKO_telnet
  switches:
    bigroom_heater: &settings
      resource: "192.168.88.246"
      port: 1111
      command_on: "1"
      command_off: "0"
      value_template: >-
        {% if value == '1' %}
          True
        {% else %}
          False
        {% endif %}
      timeout: 0.1
      name: BigRoom Heater
      device_id: "0x01020008"
- platform: ELKO_telnet
  switches:
    bigroom_curtains_open:
      <<: *settings
      name: Bigroom Curtains Open
      device_id: "0x01020073"
- platform: ELKO_telnet
