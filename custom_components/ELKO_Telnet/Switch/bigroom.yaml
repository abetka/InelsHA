# Auto-expanded: legacy YAML merge keys replaced with explicit fields
# to eliminate annotatedyaml duplicate-key warnings on HA startup.
- platform: ELKO_telnet
  switches:
    bigroom_heater:
      resource: "192.168.88.246"
      port: 1111
      command_on: "1"
      command_off: "0"
      value_template: >-
        {% if value == '1' %}
          True
        {% else %}
          False
        {% endif %}
      timeout: 0.1
      name: "BigRoom Heater"
      device_id: "0x01020008"
