# WC sensors — explicit entries to avoid the `<<:` merge that produced
# `duplicate key` warnings from annotatedyaml (HA core). Host/port are
# anchored once so they remain a single source of truth.
- platform: ELKO_telnet
  sensors:
    wc_temperature:
      friendly_name: "WC Temperature"
      host: &wc_host "192.168.88.246"
      port: &wc_port 1111
      device_id: "0x01050007"
      device_class: 'temperature'
      unit_of_measurement: "°C"

- platform: ELKO_telnet
  sensors:
    wc_switch_temperature:
      friendly_name: "WC Switch Temperature"
      host: *wc_host
      port: *wc_port
      device_id: "0x0105001c"
      device_class: 'temperature'
